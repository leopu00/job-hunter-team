# Job Hunter Team — Runtime container (root compose)
#
# Uso tipico:
#   docker compose run --rm jht setup
#   docker compose up -d jht
#
# Stato persistente: bind-mount di ~/.jht (config nascosta) e
# ~/Documents/Job Hunter Team (CV e output visibili).
#
# Nota: questo compose è separato da web/docker-compose.yml, che è
# usato solo per lo sviluppo locale del frontend Next.js.

services:
  jht:
    image: ghcr.io/leopu00/jht:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jht
    # Override del CMD Dockerfile (--help): avvia la dashboard web
    # (Next.js dev su :3000 + infra) e resta in foreground.
    command: ["dashboard", "--no-browser"]
    environment:
      # HOME points at the bind-mounted /jht_home so CLI credential
      # files (~/.claude, ~/.codex, ~/.kimi) land on the host disk
      # and persist across container recreation.
      - HOME=/jht_home
      - JHT_HOME=/jht_home
      - JHT_USER_DIR=/jht_user
      - IS_CONTAINER=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      # Inotify su bind-mount Windows+WSL2 non fa sempre propagare gli
      # eventi di modifica: forziamo il polling sia per webpack (fallback)
      # sia per Turbopack di Next 16.
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - TURBOPACK_WATCH_POLL=true
    volumes:
      - ${HOME}/.jht:/jht_home
      - ${HOME}/Documents/Job Hunter Team:/jht_user
      # ── Dev bind-mounts ────────────────────────────────────────────
      # Sorgenti del repo montati dentro /app per hot-reload senza
      # dover ricostruire l'immagine ad ogni modifica.
      #   - web/: Next dev-server ricompila quando cambiano i .ts/.tsx
      #   - agents/: prompt markdown letti da start-agent.sh al lancio
      #   - shared/: skill Python condivise chiamate dagli agenti
      # Gli anonymous volumes dopo mascherano node_modules/.next cosi'
      # i binari linux installati nell'immagine restano intatti anche
      # se l'host e' Windows/Mac (non hanno un node_modules compatibile).
      - ./web:/app/web
      - /app/web/node_modules
      - /app/web/.next
      - ./agents:/app/agents
      - ./shared:/app/shared
      # .launcher/ contiene start-agent.sh e sentinel-ticker.py: modificati
      # di frequente in dev. Senza bind-mount il container userebbe la
      # copia baked dell'immagine e servirebbe un docker cp manuale ad ogni fix.
      - ./.launcher:/app/.launcher
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    restart: unless-stopped
