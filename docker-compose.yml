# Job Hunter Team — Runtime container (production / utenti finali)
#
# Questo compose e' il default per chi installa JHT via:
#   curl -fsSL https://jobhunterteam.ai/install.sh | bash
#
# install.sh scarica questo file in ~/.jht/runtime/docker-compose.yml.
# Il wrapper bash ~/.local/bin/jht lo usa per docker compose up/down/exec.
#
# Image-only: nessun bind dei sorgenti, nessun `build:`. Tutto cio' che
# serve sta dentro l'immagine GHCR. Per il dev mode con hot-reload usa
# docker-compose.dev.yml (override) — vedi commento in fondo al file.
#
# Stato persistente: bind-mount di ~/.jht (config nascosta) e
# ~/Documents/Job Hunter Team (CV e output visibili).

services:
  jht:
    image: ghcr.io/leopu00/jht:latest
    container_name: jht
    # Override del CMD Dockerfile (--help): avvia la dashboard web
    # (Next.js su :3000 + infra) e resta in foreground come PID 1.
    command: ["dashboard", "--no-browser"]
    environment:
      # HOME points at the bind-mounted /jht_home so CLI credential
      # files (~/.claude, ~/.codex, ~/.kimi) land on the host disk
      # and persist across container recreation.
      - HOME=/jht_home
      - JHT_HOME=/jht_home
      - JHT_USER_DIR=/jht_user
      # IS_CONTAINER=1 abilita il passthrough in cli/src/utils/container-proxy.js:
      # le funzioni che oggi farebbero `docker exec jht ...` eseguono
      # comandi locali (siamo gia' nel posto giusto). Vedi
      # docs/internal/2026-05-06-host-container-split.md.
      - IS_CONTAINER=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      # Inotify su bind-mount Windows+WSL2 non fa sempre propagare gli
      # eventi di modifica: polling generale per Next.js / Turbopack.
      # Innocuo su VPS Linux dove inotify funziona nativo.
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - TURBOPACK_WATCH_POLL=true
    volumes:
      - ${HOME}/.jht:/jht_home
      - ${HOME}/Documents/Job Hunter Team:/jht_user
    ports:
      # Bind solo a 127.0.0.1: previene LAN access. Per esporre in rete,
      # mettere il container dietro un reverse proxy (nginx/traefik) o
      # un tunnel Tailscale.
      - "127.0.0.1:3000:3000"
    stdin_open: true
    tty: true
    restart: unless-stopped

# ── Dev mode ────────────────────────────────────────────────────────────
#
# Per sviluppare con hot-reload dei sorgenti (web/, agents/, shared/,
# .launcher/) usa l'override docker-compose.dev.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Build l'immagine localmente dal Dockerfile invece di pullare da GHCR.
