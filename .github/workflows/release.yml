name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

jobs:
  build-desktop:
    name: Build Desktop — ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      HAS_MAC_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' && secrets.MACOS_CERTIFICATE_PWD != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS
            build_script: dist:mac
            artifact_name: desktop-mac-release
            required_glob: desktop/dist/*.dmg
            required_label: .dmg
            artifact_glob: |
              desktop/dist/*.dmg
              desktop/dist/*.blockmap
              desktop/dist/*.yml
          - os: windows-2022
            label: Windows
            build_script: dist:win
            artifact_name: desktop-windows-release
            required_glob: desktop/dist/*.exe
            required_label: .exe
            artifact_glob: |
              desktop/dist/*.exe
              desktop/dist/*.blockmap
              desktop/dist/*.yml
          - os: ubuntu-22.04
            label: Linux
            build_script: dist:linux
            artifact_name: desktop-linux-release
            required_glob: desktop/dist/*.AppImage
            required_label: .AppImage
            artifact_glob: |
              desktop/dist/*.AppImage
              desktop/dist/*.deb
              desktop/dist/*.blockmap
              desktop/dist/*.yml
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            desktop/package-lock.json
            web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Run desktop runtime tests
        working-directory: desktop
        run: npm test

      - name: Import macOS code signing certificate
        if: matrix.os == 'macos-14' && env.HAS_MAC_SIGNING == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          CERT_PATH="$RUNNER_TEMP/jht-signing-cert.p12"
          printf '%s' "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"

      - name: Warn about unsigned macOS build
        if: matrix.os == 'macos-14' && env.HAS_MAC_SIGNING != 'true'
        run: |
          echo "::warning::Apple signing secrets are not configured — producing an UNSIGNED DMG."
          echo "::warning::End users will be blocked by Gatekeeper on first launch."
          echo "::warning::See docs/release.md for the required secrets."

      - name: Build desktop package
        working-directory: desktop
        run: npm run ${{ matrix.build_script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ (matrix.os == 'macos-14' && env.HAS_MAC_SIGNING == 'true') && 'true' || 'false' }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify macOS signature and Gatekeeper acceptance
        if: matrix.os == 'macos-14' && env.HAS_MAC_SIGNING == 'true'
        run: |
          DMG=$(ls desktop/dist/*.dmg | head -n 1)
          if [ -z "$DMG" ]; then
            echo "No DMG produced — cannot verify signature."
            exit 1
          fi
          echo "Inspecting signature of $DMG"
          codesign -dv --verbose=4 "$DMG" || true
          echo "Asserting Gatekeeper acceptance"
          spctl --assess --type open --context context:primary-signature --verbose "$DMG"

      - name: Verify expected desktop artifact
        run: |
          if ! compgen -G "${{ matrix.required_glob }}" > /dev/null; then
            echo "Missing expected desktop artifact: ${{ matrix.required_label }}"
            find desktop/dist -maxdepth 1 -type f | sort || true
            exit 1
          fi

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-desktop
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag points to production HEAD
        run: |
          git fetch origin production --depth=1
          TAG_SHA=$(git rev-list -n 1 "${GITHUB_REF_NAME}")
          PROD_SHA=$(git rev-parse origin/production)
          if [ "$TAG_SHA" != "$PROD_SHA" ]; then
            echo "Tag ${GITHUB_REF_NAME} points to ${TAG_SHA}, but origin/production is ${PROD_SHA}."
            echo "Tag releases only from the current production HEAD."
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Generate release notes
        id: changelog
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v version="$TAG_VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..HEAD"
            else
              RANGE="HEAD"
            fi
            NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --first-parent)
          fi

          if [ -z "$NOTES" ]; then
            NOTES="- Release prepared without curated notes."
          else
            NOTES=$(printf "%s\n" "$NOTES" | sed '/^[[:space:]]*$/d')
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*-release
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Job Hunter Team ${{ github.ref_name }}"
          body: |
            ## Novità in ${{ github.ref_name }}

            ${{ steps.changelog.outputs.notes }}

            ---
            Vedi [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) per la storia completa.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/*.dmg
            release-assets/*.exe
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.blockmap
            release-assets/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
