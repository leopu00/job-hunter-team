name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

jobs:
  build-desktop-mac:
    name: Build macOS DMG
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build macOS DMG
        working-directory: desktop
        run: npm run dist -- --mac dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-mac-release
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.blockmap

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-desktop-mac
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          NOTES=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-mac-release
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Job Hunter Team ${{ github.ref_name }}"
          body: |
            ## Novità in ${{ github.ref_name }}

            ${{ steps.changelog.outputs.notes }}

            ---
            Vedi [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) per la storia completa.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/*.dmg
            release-assets/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
